name: Flatten vendor tree

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  flatten:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          lfs: true
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config core.compression 0

      - name: Move vendor files to repository root
        shell: bash
        run: |
          set -e

          SRC="vendor/motorola/fogorow"

          if [ ! -d "$SRC" ]; then
            echo "Source folder not found: $SRC"
            exit 1
          fi

          shopt -s dotglob nullglob

          for item in "$SRC"/*; do
            name="$(basename "$item")"

            if [ -e "$name" ]; then
              rm -rf "$name"
            fi

            mv "$item" "$name"
          done

          rm -rf vendor

          rm -f .gitattributes
          rm -f .gitignore

      - name: Commit and push
        run: |
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Flatten vendor tree"
          git push origin main
